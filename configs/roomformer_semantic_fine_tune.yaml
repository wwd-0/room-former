# RoomFormer Semantic Fine-tune Configuration (Full Pano + BEV)
# 基于官方 roomformer_stru3d_semantic_rich.pth 进行全功能微调
# 已针对 24G 显存优化（降低 batch_size 和全景图数量）

# 1. 基础训练设置
dataset_name: custom
dataset_root: ../mnt_win/dataset  # 请确认服务器上的实际路径
batch_size: 1      # 为应对 2800 顶点查询造成的 OOM，降低为 1
epochs: 500
lr: 0.0002
lr_drop: [400]
num_workers: 4      # 配合 batch_size=1，降低 worker 数
seed: 42
output_dir: ../output
job_name: room_semantic_pano_finetune

# 2. BEV 输入设置 - 官方权重使用的是 1 通道灰度密度图
bev_channels: 1

# 3. 全景图 (Panorama) 加固设置 - 已针对显存优化
use_pano: true
pano_backproject_bias: true
pano_backproject_sigma: 64.0
max_pano_count: 5   # 从 10 减少到 5，显著降低中间变量显存占用
pano_input_h: 256
pano_input_w: 512
pano_backbone: resnet18
freeze_pano_backbone: false

# 4. 模型架构设置 - 已对齐官方 2800 / 70 规格
semantic_classes: 19
num_queries: 800
num_polys: 40
dec_layers: 6
enc_layers: 6
hidden_dim: 256
nheads: 8
backbone: resnet50
with_poly_refine: true

# 5. 损失函数权重 (与原论文对齐)
cls_loss_coef: 2.0
room_cls_loss_coef: 0.2
coords_loss_coef: 5.0
raster_loss_coef: 1.0

# 6. 指定官方语义预训练模型路径
resume: ../models/roomformer_stru3d_semantic_rich.pth

# 7. 其他微调设置
reset_epoch: true
device: cuda
