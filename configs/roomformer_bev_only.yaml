# RoomFormer BEV-Only Fine-tuning Configuration (Non-Semantic Geometry)
# 用于测试纯几何多边形提取 (不区分门、窗、具体的房间类型)
# 使用方法: python main.py --config configs/roomformer_bev_only.yaml

# 1. 基础训练设置
dataset_name: custom
dataset_root: ../mnt_win/dataset  # 请根据实际数据集路径修改
batch_size: 4      # 纯几何版没有语义头负担，Batch Size 可以稍大
epochs: 500
lr: 0.0002
lr_drop: [400]
num_workers: 4
seed: 42
output_dir: ../output
job_name: room_bev_geometry_finetune

# 2. BEV 输入设置 - 与官方权重 (1-ch) 对齐
bev_channels: 1

# 3. 全景图 (Panorama) 设置 - 已禁用 (不使用位姿)
use_pano: false
pano_backproject_bias: false
max_pano_count: 0

# 4. 模型架构设置 - 纯几何多边形模式
semantic_classes: -1  # 彻底关闭分类头
num_queries: 2800     # 匹配官方权重 2800 规格
num_polys: 70         # 2800 / 40 = 70
dec_layers: 6
enc_layers: 6
hidden_dim: 256
nheads: 8
backbone: resnet50
with_poly_refine: true

# 5. 损失函数权重 (与原论文对齐)
cls_loss_coef: 2.0
room_cls_loss_coef: 0.0  # 禁用房间分类损失
coords_loss_coef: 5.0
raster_loss_coef: 1.0

# 6. 指定官方非语义预训练模型路径
resume: ../models/roomformer_stru3d.pth

# 7. 其他微调设置
reset_epoch: true
device: cuda
